name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Typecheck and Build
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    env:
      PLAYWRIGHT_DOCKER_IMAGE: mcr.microsoft.com/playwright:v1.60.0-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Generate Prisma client
        run: yarn prisma:generate

      - name: Typecheck
        run: yarn typecheck

      - name: Build
        run: yarn build

      - name: Validate runtime package exports
        run: yarn check:runtime-exports

      - name: Smoke API
        run: yarn smoke:api

      - name: Build Storybook
        run: yarn build:storybook

      - name: Verify Playwright Docker image
        run: node scripts/check-playwright-image.mjs

      - name: Visual tests
        run: yarn test:visual:ci

      - name: Upload visual test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-artifacts
          if-no-files-found: ignore
          path: |
            test-results/**
            playwright-report/**
            **/*-actual.png
            **/*-expected.png
            **/*-diff.png
