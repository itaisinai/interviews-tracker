services:
  - type: web
    name: interviews-tracker-api
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: corepack enable && corepack prepare yarn@4.9.2 --activate && corepack yarn install --immutable && corepack yarn build:api
    startCommand: corepack yarn start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
